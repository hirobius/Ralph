name: Ralph run (reusable)

# Org-level Ralph engine — ONE deterministic iteration per call. Any hirobius
# repo runs the loop by calling this workflow from a thin caller:
#
#   uses: hirobius/ralph/.github/workflows/ralph-run-reusable.yml@main
#
# Requirements for a consumer repo (see ralph/README.md):
#   - vendor the ralph/ directory (lib.sh, next.sh, gate.sh, config.env,
#     prompt.md — gate.sh + config.env are the per-repo parts)
#   - org secrets CLAUDE_CODE_OAUTH_TOKEN (+ optional DISCORD_WEBHOOK_URL)
#   - hosted PUBLIC so private AND public repos may call it
#
# Flow: guard (event filter → wedge check → deterministic select via
# ralph/next.sh → atomic claim) → one claude iteration on the claimed issue →
# state-based reconcile (PR exists = success; branch-no-PR = recover the PR;
# nothing = attempt recorded, parked on cap). The claude step NEVER picks the
# task and the reconcile step runs even when claude dies.
#
# Idle watchdog: callers may add a `schedule:` trigger (hourly tick — see
# README). Without it the loop is event-driven only, and two things halt it
# silently: a failed iteration (nothing re-fires after a red run), and
# `issues: labeled` runs swallowed by the caller's concurrency dedup while
# another run holds the group. A schedule tick re-enters this guard — empty
# queue / healthy in-flight PR → quiet skip; wedged → Discord alert; ready
# work + idle loop → claim + chain hop. Cost of a no-op tick: one guard step.

on:
  workflow_call:
    inputs:
      issue:
        description: "Issue number to work (blank = deterministic pick via ralph/next.sh)"
        required: false
        type: string
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      DISCORD_WEBHOOK_URL:
        required: false

jobs:
  ralph:
    # Caller-repo (or org) variable RALPH_RUNNER overrides the runner label —
    # set it to `self-hosted` to run on your own hardware (zero Actions
    # minutes on private repos). Unset = GitHub-hosted, unchanged behavior.
    runs-on: ${{ vars.RALPH_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 90
    # NO job-level permissions block — deliberately (ops#144). A reusable that
    # requests a permission its caller doesn't grant startup-fails EVERY run
    # in that repo (zero jobs, no error message), and callers are vendored
    # files that skew behind the engine. Instead the job inherits exactly what
    # the caller grants, and any step that needs an optional permission
    # (actions: write for the chain hop) fails with a message naming the
    # caller fix. Callers grant: contents/issues/pull-requests/id-token: write
    # (+ actions: write for the chain hop) — see README.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify ralph/ is vendored (fail loud, not cryptic)
        run: |
          missing=""
          for f in ralph/lib.sh ralph/next.sh ralph/gate.sh ralph/prompt.md; do
            [ -f "$f" ] || missing="$missing $f"
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing:$missing — vendor the ralph/ directory from hirobius/ops (see hirobius/ops/ralph/README.md) before calling this workflow."
            exit 1
          fi

      - name: Guard — filter event, wedge-check, select + claim deterministically
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ISSUE_INPUT: ${{ inputs.issue }}
          RUN_ID: ci-${{ github.run_id }}
        run: |
          set -euo pipefail
          . ralph/lib.sh
          # INVARIANT (load-bearing): on `issues: labeled` proceed ONLY for the
          # ready label. The loop itself writes ralph-wip / needs-adrian /
          # ralph-parked — widening this filter would make it self-trigger.
          if [ "${{ github.event_name }}" = "issues" ] && \
             [ "${{ github.event.label.name }}" != "$RALPH_READY_LABEL" ]; then
            echo "Labeled with something other than $RALPH_READY_LABEL — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Explicit human dispatch always runs and STEALS any existing claim —
          # a local runner holding it detects the loss at its reconcile step.
          if [ -n "$ISSUE_INPUT" ]; then
            echo "Explicit dispatch of #$ISSUE_INPUT — stealing any existing claim."
            delete_claim_ref "$ISSUE_INPUT" || true
            if ! claim_issue "$ISSUE_INPUT" "$RUN_ID"; then
              echo "::error::Could not claim #$ISSUE_INPUT — is it open and labeled $RALPH_READY_LABEL?"
              exit 1
            fi
            echo "issue=$ISSUE_INPUT" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Single-flight: never stack a second Ralph PR — but distinguish a
          # healthy in-flight PR (quiet skip) from one WEDGED on a failed or
          # absent ralph-gate, which blocks the chain and must alert loudly.
          prs=$(open_ralph_prs)
          if [ "$(jq length <<<"$prs")" -gt 0 ]; then
            wedged=$(classify_wedged <<<"$prs")
            if [ -n "$wedged" ]; then
              echo "Ralph loop is WEDGED behind stuck PR(s):"
              echo "$wedged"
              echo "wedged=true" >> "$GITHUB_OUTPUT"
              { echo "reason<<WEDGE_EOF"; printf '%s\n' "$wedged"; echo "WEDGE_EOF"; } >> "$GITHUB_OUTPUT"
            else
              echo "A healthy Ralph PR is in flight — skipping quietly (single-flight)."
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Deterministic select. Empty queue (10) is a clean skip, NOT a red
          # run; an API failure (20) fails loud — it must never look like
          # "nothing to do" while work is queued.
          code=0
          issue=$(bash ralph/next.sh) || code=$?
          if [ "$code" -eq 10 ]; then
            echo "No eligible $RALPH_READY_LABEL issues — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          elif [ "$code" -ne 0 ]; then
            echo "::error::ralph/next.sh failed (code $code) — GitHub API trouble, not an empty queue."
            exit 1
          fi
          if ! [[ "$issue" =~ ^[0-9]+$ ]]; then
            echo "::error::selector emitted non-numeric output ('$issue') — a helper leaked stdout; refusing to claim garbage."
            exit 1
          fi
          # Atomic claim (ref create = test-and-set): losing means another
          # runner (local or CI) owns it — skip, never double-work.
          if ! claim_issue "$issue" "$RUN_ID"; then
            echo "Lost the claim race on #$issue — another runner owns it. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Claimed #$issue (run $RUN_ID)."
          echo "issue=$issue" >> "$GITHUB_OUTPUT"

      - name: Chain hop — a push or schedule run re-enters via workflow_dispatch
        id: chain
        if: steps.guard.outputs.issue != '' && (github.event_name == 'push' || github.event_name == 'schedule')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # claude-code-action@v1 hard-rejects `push` events ("Unsupported
          # event type: push") — a latent flaw in the original chain that the
          # working guard exposed on its first claimed push run — and rejects
          # `schedule` (the idle-watchdog tick, see header) the same way. So
          # the chain converts either event into an explicit dispatch of the
          # issue we just claimed; the dispatched run's claim-steal re-claims
          # it and runs the model under a supported event. No loop risk:
          # dispatch runs never re-dispatch (this step is push/schedule-only),
          # and the concurrency group keeps the hop serialized.
          if ! gh workflow run "${{ github.workflow }}" -R "$GITHUB_REPOSITORY" \
            --field issue="${{ steps.guard.outputs.issue }}"; then
            # Degrade legibly, never wedge: release the claim so the issue is
            # re-claimable, then fail THIS run with the exact caller fix.
            . ralph/lib.sh
            delete_claim_ref "${{ steps.guard.outputs.issue }}" || true
            echo "hop_failed=true" >> "$GITHUB_OUTPUT"
            echo "::error::chain hop failed — caller lacks 'actions: write'. Add it under the ralph job's permissions in .github/workflows/ralph.yml (the push/schedule→dispatch hop needs it). Claim on #${{ steps.guard.outputs.issue }} released; re-trigger via workflow_dispatch or by re-adding ralph-ready."
            exit 1
          fi
          echo "Chained: dispatched '${{ github.workflow }}' for issue #${{ steps.guard.outputs.issue }}."
          echo "chained=true" >> "$GITHUB_OUTPUT"

      - name: Alert Discord — Ralph loop wedged behind a stuck PR
        if: steps.guard.outputs.wedged == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REASON: ${{ steps.guard.outputs.reason }}
          REPO: ${{ github.repository }}
          ACTIONS_URL: ${{ github.server_url }}/${{ github.repository }}/actions
        run: |
          echo "Ralph loop wedged. Blocking PR(s):"
          printf '%s\n' "$REASON"
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "No DISCORD_WEBHOOK_URL secret — logged above; cannot ping Discord."
            exit 0
          fi
          msg=$(printf '🟠 **Ralph loop WEDGED** on `%s` — the queue is NOT advancing because open Ralph PR(s) will not merge:\n%s\n\nClear them (address the review, rebase, or close the branch) to resume the chain: %s' \
            "$REPO" "$REASON" "$ACTIONS_URL")
          curl -sS -H "Content-Type: application/json" \
            -d "$(jq -n --arg c "$msg" '{content:$c}')" \
            "$DISCORD_WEBHOOK_URL" || echo "Discord alert failed (non-fatal)."

      - uses: pnpm/action-setup@v4
        if: steps.guard.outputs.issue != '' && steps.chain.outputs.chained != 'true'
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.issue != '' && steps.chain.outputs.chained != 'true'
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies (so ralph/gate.sh can run)
        if: steps.guard.outputs.issue != '' && steps.chain.outputs.chained != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code — one Ralph iteration on the claimed issue
        id: work
        if: steps.guard.outputs.issue != '' && steps.chain.outputs.chained != 'true'
        continue-on-error: true # reconcile decides the real outcome
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The chain hop dispatches as github-actions[bot], and the action
          # rejects bot actors by default — same setting ralph-gate always had.
          allowed_bots: "*"
          claude_args: |
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep"
          prompt: |
            Read ralph/prompt.md and AGENTS.md in this repo first — their rules
            are binding. Then do EXACTLY ONE Ralph iteration and STOP.

            ISSUE=${{ steps.guard.outputs.issue }} — work exactly this issue.
            It was selected and claimed deterministically; never pick another.

            Binding rules (ralph/prompt.md + AGENTS.md "Ralph quality bar"):
            - ONE logical change, smallest complete slice. Comment the rest
              back on the issue.
            - `bash ralph/gate.sh` MUST pass green before any PR. Never weaken
              tests or types to pass it. Red gate = no PR.
            - Branch ralph/issue-${{ steps.guard.outputs.issue }}-<slug>. Open
              a PR with "Closes #${{ steps.guard.outputs.issue }}" in the body.
              Comment a 2-line summary on the issue.
            - NEVER merge or push to main — merges are human-approved via the
              ralph-gate workflow. No destructive ops (DB migrations, deletes).
            - Append what you did to progress.txt.
            - If blocked, ambiguous, or needs a human decision: do a clean
              blocked-stop (prompt.md §1) — post a comment whose FIRST line is
              exactly `ralph-blocked: <reason>`, open NO PR, touch no labels,
              and STOP. The marker routes it to a human without burning an
              attempt; omitting it makes a deliberate stop look like a crash.

      - name: Reconcile — state decides what actually happened
        # hop_failed = infra misconfig (caller permission), NOT an attempt on
        # the issue — don't burn its attempt budget; the claim was released.
        if: always() && steps.guard.outputs.issue != '' && steps.chain.outputs.chained != 'true' && steps.chain.outputs.hop_failed != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          outcome=$(bash ralph/lib.sh reconcile_issue \
            "${{ steps.guard.outputs.issue }}" "ci-${{ github.run_id }}" \
            "claude step outcome: ${{ steps.work.outcome }}")
          echo "reconcile: $outcome"
          case "$outcome" in
            pr:*)     echo "✅ shipped — $outcome" ;;
            parked:*) echo "🅿️ ${outcome#parked:}" ;;
            *)        echo "::error::iteration failed — ${outcome#failed:}"; exit 1 ;;
          esac

      - name: Notify Discord (run summary)
        if: always() && steps.guard.outputs.skip != 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
          ISSUE: ${{ steps.guard.outputs.issue }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "No DISCORD_WEBHOOK_URL secret set — skipping Discord notify."
            exit 0
          fi
          case "$STATUS" in
            success) EMOJI="✅" ;;
            failure) EMOJI="❌" ;;
            *)       EMOJI="⚪" ;;
          esac
          curl -sS -H "Content-Type: application/json" \
            -d "$(printf '{"content":"%s Ralph run **%s** on `%s` (issue #%s) — run log: %s"}' \
              "$EMOJI" "$STATUS" "$REPO" "${ISSUE:-?}" "$RUN_URL")" \
            "$DISCORD_WEBHOOK_URL" || echo "Discord notify failed (non-fatal)."
