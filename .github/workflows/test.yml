name: Engine tests

# The engine kit had no CI on its own PRs — kit/lib.sh changes (including the
# reconcile logic whose regressions caused the site-engine#86 fleet stall and
# the hds#126 restart loop) merged ungated. This runs the kit's bash
# regression tests + shellcheck on every change to kit/ or tests/. Make it a
# required check in branch protection to gate merges.

on:
  push:
    branches: [main]
    paths: ["kit/**", "tests/**", ".github/workflows/test.yml"]
  pull_request:
    paths: ["kit/**", "tests/**", ".github/workflows/test.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check kit + tests (bash -n)
        run: bash -n kit/*.sh tests/*.sh tests/*.test.sh tests/stubs/gh tests/stubs/git
      - name: shellcheck
        # -S warning: the kit predates shellcheck; info/style notes in
        # untouched files must not block engine PRs.
        run: shellcheck -x -S warning kit/*.sh tests/*.sh tests/*.test.sh tests/stubs/gh tests/stubs/git
      - name: Kit decision-table tests (reconcile + selection)
        run: bash tests/run.sh
