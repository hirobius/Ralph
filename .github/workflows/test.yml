name: Engine tests

# The engine kit had no CI on its own PRs — kit/lib.sh changes (including the
# reconcile logic whose regression caused the site-engine#86 fleet stall)
# merged ungated. This runs the kit's bash regression tests on every change to
# kit/ or tests/. Make it a required check in branch protection to gate merges.

on:
  push:
    branches: [main]
    paths: ["kit/**", "tests/**", ".github/workflows/test.yml"]
  pull_request:
    paths: ["kit/**", "tests/**", ".github/workflows/test.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax-check the kit (bash -n)
        run: for f in kit/*.sh; do bash -n "$f"; done
      - name: reconcile_issue regression tests
        run: bash tests/reconcile.test.sh
